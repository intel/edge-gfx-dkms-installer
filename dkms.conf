PACKAGE_NAME="edge-gfx-dkms"
PACKAGE_VERSION="1.0"

# Build the i915 module from the vendored i915 snapshot under kernel-src/drivers/gpu/drm/i915/
BUILT_MODULE_NAME[0]="i915"
BUILT_MODULE_LOCATION[0]="kernel-src/drivers/gpu/drm/i915"
DEST_MODULE_LOCATION[0]="/updates"

# kvmgt is built from the same i915 snapshot (GVT-g / SR-IOV virtualization helper)
BUILT_MODULE_NAME[1]="kvmgt"
BUILT_MODULE_LOCATION[1]="kernel-src/drivers/gpu/drm/i915"
DEST_MODULE_LOCATION[1]="/updates"

AUTOINSTALL="yes"

# DKMS provides ${kernel_source_dir} (defaults to /lib/modules/<kver>/build)
MAKE[0]="make CROSS_COMPILE= CC=${CC:-$(command -v gcc-16 || command -v gcc-14 || echo gcc)} CONFIG_DEBUG_INFO_BTF=n CONFIG_DEBUG_INFO_BTF_MODULES=n -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/kernel-src modules"
CLEAN="if [ -f ${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/kernel-src/drivers/gpu/drm/i915/Makefile ]; then make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/kernel-src clean; fi"

# Apply patches from patches/ inside the DKMS build directory.
# (This repo includes a 6.12-only compat patch; see patches/README.md.)
PRE_BUILD="scripts/dkms-pre-build.sh"
POST_INSTALL="scripts/dkms-post-install.sh"

# Restrict builds to supported kernel versions.
# This DKMS tree is validated against the 6.18.x series and 6.18-intel.
BUILD_EXCLUSIVE_KERNEL="^6\.18[\.-]"
