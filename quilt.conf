# quilt.conf — Persistent configuration for the remote SR-IOV quilt patch repository.
#
# This file is sourced by scripts/dkms-pre-build.sh (and can be sourced manually).
# Environment variables set by the caller take precedence over the values here.
#
# QUILT_REPO   — URL of the quilt patch repository to clone.
# QUILT_BRANCH — Branch to check out.  Leave empty to auto-detect from the
#                current installer repo branch (recommended).

QUILT_REPO="${QUILT_REPO:-https://github.com/intel/linux-intel-quilt.git}"
#QUILT_REPO="${QUILT_REPO:-https://github.com/mfliou/linux-intel-quilt.git}"
QUILT_BRANCH="${QUILT_BRANCH:-6.18/linux}"
